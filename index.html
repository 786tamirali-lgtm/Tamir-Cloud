<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamir-Cloud | सुपरफास्ट अपलोड</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: linear-gradient(145deg, #0a2540 0%, #1a3b5c 100%); padding: 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .glass-card { background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); width: 100%; max-width: 480px; padding: 28px 24px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.3); }
        
        h2 { color: #1a73e8; text-align: center; margin-bottom: 24px; font-size: 32px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }
        h2 span { background: #1a73e8; color: white; font-size: 14px; padding: 6px 16px; border-radius: 60px; font-weight: 500; }
        
        .upload-box { background: #f8fcff; border: 3px dashed #1a73e8; border-radius: 32px; padding: 28px 20px; text-align: center; transition: all 0.3s; }
        .upload-box:hover { background: #edf5ff; border-color: #0d62d0; transform: translateY(-2px); }
        
        .file-label { display: block; width: 100%; cursor: pointer; }
        .file-input { display: none; }
        .file-button { background: white; border: 2px solid #1a73e8; color: #1a73e8; padding: 16px 24px; border-radius: 60px; font-weight: 600; font-size: 16px; display: inline-block; transition: 0.2s; box-shadow: 0 4px 12px rgba(26,115,232,0.2); }
        .file-button:hover { background: #1a73e8; color: white; }
        
        .preview-card { background: white; border-radius: 24px; padding: 16px; margin: 20px 0; display: flex; align-items: center; gap: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eef2f7; }
        #preview { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; border: 3px solid white; box-shadow: 0 8px 16px rgba(0,0,0,0.1); display: none; }
        #preview.show { display: block; }
        .file-meta { flex: 1; text-align: left; }
        .file-meta .name { font-weight: 600; color: #1e2b3c; margin-bottom: 4px; font-size: 15px; }
        .file-meta .size { color: #5f6c84; font-size: 13px; }
        .file-meta .compress-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 30px; font-size: 12px; display: inline-block; margin-top: 6px; font-weight: 500; }
        
        .progress-section { margin: 20px 0 15px; }
        .progress-bar { width: 100%; height: 12px; background: #e9ecf2; border-radius: 30px; overflow: hidden; margin-bottom: 8px; display: none; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #1a73e8, #4791ff, #6aa9ff); border-radius: 30px; transition: width 0.2s ease; }
        .progress-text { font-size: 14px; color: #1a73e8; font-weight: 600; display: none; }
        
        #status { font-size: 15px; color: #1e2b3c; margin: 16px 0; padding: 14px 20px; border-radius: 50px; background: #e8f0fe; display: none; font-weight: 500; border: 1px solid rgba(26,115,232,0.2); }
        
        .btn-primary { width: 100%; background: #1a73e8; color: white; padding: 18px; border: none; border-radius: 60px; font-weight: 700; font-size: 17px; cursor: pointer; box-shadow: 0 10px 25px rgba(26,115,232,0.4); display: none; transition: 0.2s; }
        .btn-primary:hover { background: #0d62d0; transform: translateY(-2px); box-shadow: 0 15px 30px rgba(26,115,232,0.5); }
        .btn-primary:disabled { background: #a0b8d4; box-shadow: none; transform: none; cursor: not-allowed; }

        .list-container { width: 100%; max-width: 480px; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; padding: 0 8px; }
        .list-header h3 { color: white; font-size: 22px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .count-badge { background: #1a73e8; color: white; padding: 6px 18px; border-radius: 40px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .photo-grid { display: flex; flex-direction: column; gap: 14px; }
        .photo-item { background: white; border-radius: 28px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); animation: slideUp 0.3s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .photo-item img { width: 70px; height: 70px; border-radius: 22px; object-fit: cover; cursor: pointer; border: 3px solid white; box-shadow: 0 8px 16px rgba(0,0,0,0.1); transition: 0.2s; }
        .photo-item img:hover { transform: scale(1.05); }
        
        .item-info { flex: 1; }
        .item-time { font-size: 13px; color: #5f6c84; margin-bottom: 6px; font-weight: 500; }
        .item-link { background: #e8f0fe; color: #1a73e8; padding: 6px 14px; border-radius: 30px; font-size: 12px; display: inline-block; max-width: 180px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; border: 1px solid rgba(26,115,232,0.2); font-weight: 500; }
        
        .item-actions { display: flex; gap: 8px; }
        .action-btn { width: 48px; height: 48px; border-radius: 48px; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; background: #f1f5f9; }
        .copy-btn { background: #e8f4ff; color: #1a73e8; }
        .delete-btn { background: #ffefed; color: #d32f2f; }
        .action-btn:hover { filter: brightness(0.95); transform: scale(0.95); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(12px); }
        .modal img { max-width: 95%; max-height: 90vh; border-radius: 32px; border: 4px solid white; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .modal-close { position: absolute; top: 20px; right: 30px; background: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 36px; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .modal-close:hover { transform: rotate(90deg); background: #f0f0f0; }

        .empty-state { text-align: center; color: rgba(255,255,255,0.7); padding: 40px 20px; background: rgba(255,255,255,0.1); border-radius: 40px; backdrop-filter: blur(10px); font-size: 16px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>🌩️ Tamir-Cloud <span>प्रो</span></h2>
    <div class="upload-box">
        <label class="file-label">
            <input type="file" id="imageInput" class="file-input" accept="image/*">
            <span class="file-button">📸 फोटो चुनें</span>
        </label>
        
        <div class="preview-card" id="previewCard" style="display: none;">
            <img id="preview" alt="preview">
            <div class="file-meta">
                <div class="name" id="fileName"></div>
                <div class="size" id="fileSize"></div>
                <div class="compress-badge" id="compressBadge"></div>
            </div>
        </div>
        
        <div class="progress-section">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        
        <div id="status"></div>
        <button id="saveBtn" class="btn-primary">☁️ क्लाउड में अपलोड करें</button>
    </div>
</div>

<div class="list-container">
    <div class="list-header">
        <h3>📸 आपकी लाइब्रेरी</h3>
        <span class="count-badge" id="fileCount">0</span>
    </div>
    <div class="photo-grid" id="photoList">
        <div class="empty-state">✨ फोटो अपलोड करें और यहाँ दिखेगी</div>
    </div>
</div>

<div class="modal" id="imageModal">
    <button class="modal-close" onclick="document.getElementById('imageModal').style.display='none'">&times;</button>
    <img id="modalImage" src="" onclick="event.stopPropagation()">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
    import { getDatabase, ref as dbRef, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAv2kO-fV5oKa4_mQj5TGBQGMUs142N4lc",
        authDomain: "tamir-cloud.firebaseapp.com",
        projectId: "tamir-cloud",
        storageBucket: "tamir-cloud.firebasestorage.app",
        messagingSenderId: "216452127534",
        appId: "1:216452127534:web:b8cb8e687f44eded0ef8bf",
        databaseURL: "https://tamir-cloud-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    const db = getDatabase(app);

    // DOM Elements
    const imageInput = document.getElementById('imageInput');
    const saveBtn = document.getElementById('saveBtn');
    const status = document.getElementById('status');
    const photoList = document.getElementById('photoList');
    const preview = document.getElementById('preview');
    const previewCard = document.getElementById('previewCard');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const compressBadge = document.getElementById('compressBadge');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const fileCount = document.getElementById('fileCount');
    const modal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');

    let selectedFile = null;
    let compressedFile = null;
    let originalSize = 0;

    // File Selection
    imageInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        selectedFile = file;
        originalSize = file.size;

        // Show preview
        const reader = new FileReader();
        reader.onload = (ev) => {
            preview.src = ev.target.result;
            preview.classList.add('show');
            previewCard.style.display = 'flex';
            fileName.innerText = file.name.length > 25 ? file.name.substr(0,22)+'…' : file.name;
            fileSize.innerText = `आकार: ${(file.size / 1024).toFixed(1)} KB`;
        };
        reader.readAsDataURL(file);

        status.style.display = 'block';
        status.innerText = "⚡ कंप्रेस किया जा रहा है...";
        saveBtn.style.display = 'none';
        compressBadge.innerText = 'कंप्रेसिंग...';

        // Force compress all images for better performance
        try {
            const compressed = await compressImageAdvanced(file);
            compressedFile = compressed;
            const compressedSize = compressed.size;
            const savings = ((originalSize - compressedSize) / originalSize * 100).toFixed(1);
            
            compressBadge.innerText = `✨ कंप्रेस हुआ: ${(compressedSize/1024).toFixed(1)} KB (${savings}% कम)`;
            status.innerText = "✅ फोटो तैयार है";
            saveBtn.style.display = 'block';
        } catch (err) {
            compressedFile = file;
            compressBadge.innerText = '⚠️ बिना कंप्रेस';
            status.innerText = "✅ फोटो तैयार है";
            saveBtn.style.display = 'block';
        }
    };

    // Advanced Compression
    function compressImageAdvanced(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    // Smart sizing: अगर फोटो बड़ी है तो छोटा करो
                    const MAX_WIDTH = 1200;
                    const MAX_HEIGHT = 1200;
                    
                    if (width > height && width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    } else if (height > MAX_HEIGHT) {
                        width = Math.round((width * MAX_HEIGHT) / height);
                        height = MAX_HEIGHT;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Quality adjust based on file size
                    let quality = 0.8;
                    if (file.size > 5_000_000) quality = 0.5;
                    else if (file.size > 2_000_000) quality = 0.6;
                    else if (file.size > 1_000_000) quality = 0.7;
                    
                    canvas.toBlob((blob) => {
                        if (blob) resolve(blob);
                        else reject();
                    }, 'image/jpeg', quality);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    // Upload with Progress
    saveBtn.onclick = () => {
        if (!compressedFile) return;

        saveBtn.disabled = true;
        saveBtn.innerText = "⏫ अपलोड हो रहा है...";
        status.innerText = "📤 अपलोड शुरू...";
        progressBar.style.display = 'block';
        progressText.style.display = 'block';
        
        const timestamp = Date.now();
        const filePath = `photos/${timestamp}.jpg`;
        const fileRef = storageRef(storage, filePath);
        
        const uploadTask = uploadBytesResumable(fileRef, compressedFile);

        uploadTask.on('state_changed',
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                progressFill.style.width = progress + '%';
                progressText.innerText = Math.round(progress) + '%';
                status.innerText = `⬆️ अपलोड ${Math.round(progress)}%`;
            },
            (error) => {
                console.error('Upload error:', error);
                status.innerText = "❌ अपलोड फेल: " + error.message;
                alert("अपलोड नहीं हो सका। Firebase Storage Rules चेक करें।\n\nError: " + error.message);
                saveBtn.disabled = false;
                saveBtn.innerText = "☁️ क्लाउड में अपलोड करें";
                progressBar.style.display = 'none';
                progressText.style.display = 'none';
            },
            async () => {
                try {
                    const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                    
                    // Save to Database
                    const dbPath = dbRef(db, 'photos');
                    const newEntry = push(dbPath);
                    await set(newEntry, {
                        url: downloadURL,
                        path: filePath,
                        time: new Date().toLocaleString('hi-IN'),
                        name: selectedFile?.name || 'photo.jpg',
                        size: compressedFile.size
                    });

                    status.innerText = "✅ अपलोड पूरा!";
                    saveBtn.style.display = 'none';
                    progressBar.style.display = 'none';
                    progressText.style.display = 'none';
                    previewCard.style.display = 'none';
                    preview.classList.remove('show');
                    imageInput.value = '';
                    compressedFile = null;
                    
                    setTimeout(() => {
                        status.style.display = 'none';
                    }, 2000);
                    
                } catch (dbError) {
                    alert("डेटाबेस में सेव नहीं हुआ: " + dbError.message);
                }
                
                saveBtn.disabled = false;
                saveBtn.innerText = "☁️ क्लाउड में अपलोड करें";
            }
        );
    };

    // Real-time List
    onValue(dbRef(db, 'photos'), (snapshot) => {
        if (!snapshot.exists()) {
            photoList.innerHTML = '<div class="empty-state">📭 कोई फोटो नहीं है</div>';
            fileCount.innerText = '0';
            return;
        }

        let items = [];
        let count = 0;
        
        snapshot.forEach((child) => {
            items.push({ key: child.key, ...child.val() });
            count++;
        });
        
        fileCount.innerText = count;
        
        if (items.length === 0) {
            photoList.innerHTML = '<div class="empty-state">📭 कोई फोटो नहीं है</div>';
            return;
        }

        // Sort by time (newest first)
        items.sort((a, b) => (b.time || '').localeCompare(a.time || ''));
        
        photoList.innerHTML = '';
        
        items.forEach((data) => {
            if (!data.url) return;

            const div = document.createElement('div');
            div.className = 'photo-item';
            div.innerHTML = `
                <img src="${data.url}" onclick="window.openModal('${data.url}')" 
                     onerror="this.src='https://via.placeholder.com/70?text=Error'">
                <div class="item-info">
                    <div class="item-time">${data.time || 'अज्ञात'}</div>
                    <div class="item-link" title="${data.url}">🔗 लिंक एक्टिव</div>
                </div>
                <div class="item-actions">
                    <button class="action-btn copy-btn" onclick="window.copyLink('${data.url}')" title="लिंक कॉपी">📋</button>
                    <button class="action-btn delete-btn" onclick="window.deletePhoto('${data.key}', '${data.path}')" title="डिलीट">🗑️</button>
                </div>
            `;
            photoList.appendChild(div);
        });
    });

    // Global Functions
    window.copyLink = (url) => {
        navigator.clipboard.writeText(url);
        status.style.display = 'block';
        status.innerText = '🔗 लिंक कॉपी हो गया!';
        setTimeout(() => {
            status.style.display = 'none';
        }, 2000);
    };

    window.deletePhoto = async (id, path) => {
        if (!confirm('⚠️ क्या आप फोटो डिलीट करना चाहते हैं?')) return;
        
        try {
            if (path) {
                const fileRef = storageRef(storage, path);
                await deleteObject(fileRef).catch(() => {});
            }
            await remove(dbRef(db, 'photos/' + id));
            
            status.style.display = 'block';
            status.innerText = '🗑️ फोटो डिलीट हो गई';
            setTimeout(() => status.style.display = 'none', 2000);
        } catch (err) {
            alert('डिलीट एरर: ' + err.message);
        }
    };

    window.openModal = (url) => {
        modalImage.src = url;
        modal.style.display = 'flex';
    };

    // Close modal on background click
    modal.onclick = function() {
        this.style.display = 'none';
    };
</script>

</body>
</html>
