<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamir-Cloud | स्मार्ट फोटो मैनेजर</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e6edf7 0%, #d9e3f0 100%);
            min-height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0, 20, 50, 0.15), 0 4px 12px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 24px 20px 28px;
            margin-bottom: 24px;
            transition: all 0.2s ease;
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #0a2540;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h2 span {
            background: #1a73e8;
            color: white;
            font-size: 14px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        .upload-area {
            background: rgba(248, 250, 255, 0.7);
            border-radius: 28px;
            padding: 22px 18px;
            border: 2px dashed rgba(26, 115, 232, 0.4);
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: #1a73e8;
            background: rgba(248, 250, 255, 0.9);
        }

        .file-input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 18px;
        }

        input[type="file"] {
            width: 100%;
            padding: 14px;
            background: white;
            border: 1px solid #d0d9e8;
            border-radius: 60px;
            font-size: 15px;
            color: #1e2b3c;
            cursor: pointer;
            transition: 0.2s;
        }

        input[type="file"]:hover {
            border-color: #1a73e8;
        }

        .preview-box {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0 12px;
        }

        .image-preview {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: #eef2f7;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: none;
        }

        .image-preview.show {
            display: block;
        }

        .file-info {
            flex: 1;
            font-size: 14px;
            color: #2c3d5c;
            font-weight: 500;
        }

        .file-info small {
            color: #5f6c84;
            font-weight: 400;
            font-size: 13px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            margin: 15px 0 8px;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1a73e8, #4791ff);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        #status {
            font-size: 14px;
            color: #2d4059;
            background: #eef4ff;
            padding: 8px 14px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid rgba(26,115,232,0.2);
        }

        button {
            border: none;
            background: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .save-btn {
            width: 100%;
            background: #1a73e8;
            color: white;
            padding: 16px 20px;
            font-size: 17px;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(26,115,232,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
        }

        .save-btn:not(:disabled):hover {
            background: #0d62d0;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(26,115,232,0.4);
        }

        .save-btn:disabled {
            background: #a0b8d4;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        .list-section {
            width: 100%;
            max-width: 480px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
            padding: 0 6px;
        }

        h3 {
            font-size: 20px;
            font-weight: 600;
            color: #0a2540;
            letter-spacing: -0.2px;
        }

        .badge {
            background: #1a73e8;
            color: white;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
        }

        .photo-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .photo-card {
            background: white;
            border-radius: 24px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 14px rgba(0, 10, 30, 0.08);
            border: 1px solid rgba(0,0,0,0.02);
            transition: 0.2s;
            animation: fadeIn 0.3s;
        }

        .photo-card:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(26,115,232,0.12);
            border-color: rgba(26,115,232,0.2);
        }

        .info {
            font-size: 14px;
            color: #1e2f4a;
            max-width: 210px;
        }

        .info strong {
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
            color: #0a2540;
        }

        .view-link {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 500;
            background: #f1f5f9;
            color: #2d3c5a;
            border: 1px solid #e3eaf2;
        }

        .copy-btn {
            background: #e8f4ff;
            color: #1a73e8;
        }

        .del-btn {
            background: #ffeeed;
            color: #d93c2b;
        }

        .icon-btn:hover {
            filter: brightness(0.96);
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 32px;
            background: white;
            padding: 10px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 80vh;
            border-radius: 24px;
            display: block;
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 30px;
            background: white;
            border: none;
            font-size: 28px;
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container glass-card">
    <h2>
        🌩️ Tamir-Cloud
        <span>सुरक्षित</span>
    </h2>
    <div class="upload-area">
        <div class="file-input-wrapper">
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="preview-box">
            <img id="previewImg" class="image-preview" alt="preview">
            <div class="file-info" id="fileInfo">
                <span id="fileName">कोई फाइल नहीं चुनी</span><br>
                <small id="fileSize">—</small>
            </div>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="status">✨ फोटो चुनें, ऑटो कंप्रेस होगी</div>
        <button id="saveBtn" class="save-btn" style="display:none;">☁️ क्लाउड पर सेव करें</button>
    </div>
</div>

<div class="list-section">
    <div class="section-header">
        <h3>📸 आपकी फाइलें</h3>
        <span class="badge" id="fileCount">0</span>
    </div>
    <div class="photo-grid" id="photoList">
        <p style="text-align:center; color:#5f6c84; padding:24px;">लोड हो रहा है...</p>
    </div>
</div>

<!-- Modal for full view -->
<div class="modal" id="imageModal" onclick="this.classList.remove('show')">
    <span class="close-modal" onclick="document.getElementById('imageModal').classList.remove('show')">&times;</span>
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="modalImage" src="" alt="Full view">
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
    import { getDatabase, ref as dRef, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAv2kO-fV5oKa4_mQj5TGBQGMUs142N4lc",
        authDomain: "tamir-cloud.firebaseapp.com",
        projectId: "tamir-cloud",
        storageBucket: "tamir-cloud.firebasestorage.app",
        messagingSenderId: "216452127534",
        appId: "1:216452127534:web:b8cb8e687f44eded0ef8bf",
        databaseURL: "https://tamir-cloud-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    const db = getDatabase(app);

    // DOM elements
    const imageInput = document.getElementById('imageInput');
    const saveBtn = document.getElementById('saveBtn');
    const status = document.getElementById('status');
    const photoList = document.getElementById('photoList');
    const previewImg = document.getElementById('previewImg');
    const fileNameSpan = document.getElementById('fileName');
    const fileSizeSpan = document.getElementById('fileSize');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const fileCount = document.getElementById('fileCount');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');

    let selectedBlob = null;
    let originalFileName = '';

    // File selection + preview + compress
    imageInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return resetUpload();

        originalFileName = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
        fileNameSpan.innerText = originalFileName.length > 20 ? originalFileName.substr(0,17)+'…' : originalFileName;
        fileSizeSpan.innerText = `आकार: ${(file.size / 1024).toFixed(1)} KB`;

        // Show preview
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewImg.src = ev.target.result;
            previewImg.classList.add('show');
        };
        reader.readAsDataURL(file);

        status.innerText = "⏳ कंप्रेस हो रहा है...";
        saveBtn.style.display = 'none';

        // Auto compress if >1MB, else keep original
        try {
            if (file.size > 1_000_000) {
                selectedBlob = await compressImage(file);
                status.innerText = `✅ कंप्रेस हुई: ${(selectedBlob.size / 1024).toFixed(1)} KB (मूल ${(file.size/1024).toFixed(1)} KB)`;
            } else {
                selectedBlob = file;
                status.innerText = `✅ तैयार (बिना कंप्रेस)`;
            }
            saveBtn.style.display = 'block';
        } catch (err) {
            status.innerText = "❌ कंप्रेस फेल, सीधे अपलोड";
            selectedBlob = file; // fallback
            saveBtn.style.display = 'block';
        }
    };

    function compressImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width;
                    let height = img.height;
                    const MAX = 1200;
                    if (width > height && width > MAX) {
                        height *= MAX / width;
                        width = MAX;
                    } else if (height > MAX) {
                        width *= MAX / height;
                        height = MAX;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    canvas.toBlob((blob) => {
                        if (blob) resolve(blob);
                        else reject('Blob error');
                    }, 'image/jpeg', 0.8);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    // Upload with progress
    saveBtn.onclick = async () => {
        if (!selectedBlob) return;

        saveBtn.disabled = true;
        saveBtn.innerText = '⏫ अपलोडिंग...';
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        
        const timestamp = Date.now();
        const filePath = `tamir_cloud/${timestamp}.jpg`;
        const storageRef = sRef(storage, filePath);
        const uploadTask = uploadBytesResumable(storageRef, selectedBlob);

        uploadTask.on('state_changed', 
            (snapshot) => {
                const prog = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                progressFill.style.width = prog + '%';
                status.innerText = `⬆️ अपलोड ${Math.round(prog)}%`;
            },
            (error) => {
                console.error(error);
                alert('अपलोड फेल, कंसोल चेक करें');
                saveBtn.disabled = false;
                saveBtn.innerText = '☁️ क्लाउड पर सेव करें';
                progressBar.style.display = 'none';
            },
            async () => {
                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                const dbPath = dRef(db, 'images');
                const newEntry = push(dbPath);
                await set(newEntry, {
                    url: downloadURL,
                    path: filePath,
                    time: new Date().toLocaleString('hi-IN'),
                    name: originalFileName
                });

                status.innerText = '✅ अपलोड पूरा!';
                saveBtn.style.display = 'none';
                progressBar.style.display = 'none';
                imageInput.value = '';
                previewImg.classList.remove('show');
                fileNameSpan.innerText = 'कोई फाइल नहीं चुनी';
                fileSizeSpan.innerText = '—';
                selectedBlob = null;
                saveBtn.disabled = false;
                saveBtn.innerText = '☁️ क्लाउड पर सेव करें';
            }
        );
    };

    // Real-time list
    onValue(dRef(db, 'images'), (snapshot) => {
        photoList.innerHTML = '';
        if (!snapshot.exists()) {
            photoList.innerHTML = '<p style="text-align:center; color:#6b7a95; padding:40px;">📭 कोई फाइल नहीं है</p>';
            fileCount.innerText = '0';
            return;
        }

        let count = 0;
        snapshot.forEach(() => count++);
        fileCount.innerText = count;

        const items = [];
        snapshot.forEach((child) => items.push({ key: child.key, ...child.val() }));
        items.reverse().forEach((data) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.innerHTML = `
                <div class="info">
                    <strong>${data.name || 'फोटो'}</strong>
                    <span style="font-size:11px; color:#6b7a95;">${data.time || ''}</span>
                    <button class="view-link" data-url="${data.url}" style="background:none; border:none; color:#1a73e8; display:flex; gap:4px; padding:4px 0;" onclick="window.openViewer('${data.url}')">
                        🔍 त्वरित देखें
                    </button>
                </div>
                <div class="actions">
                    <button class="icon-btn copy-btn" title="लिंक कॉपी" onclick="copyLink('${data.url}')">📋</button>
                    <button class="icon-btn del-btn" title="डिलीट" onclick="deletePhoto('${data.key}', '${data.path}')">🗑️</button>
                </div>
            `;
            photoList.appendChild(card);
        });
    });

    // Global functions
    window.copyLink = (url) => {
        navigator.clipboard.writeText(url);
        status.innerText = '🔗 लिंक कॉपी!';
        setTimeout(() => { status.innerText = '✨ फोटो चुनें, ऑटो कंप्रेस होगी'; }, 2000);
    };

    window.deletePhoto = async (id, path) => {
        if (confirm('⚠️ क्या आप हमेशा के लिए डिलीट करना चाहते हैं?')) {
            try {
                const fileRef = sRef(storage, path);
                await deleteObject(fileRef);
                await remove(dRef(db, 'images/' + id));
                status.innerText = '🗑️ डिलीट हो गया';
            } catch (err) {
                alert('डिलीट एरर: ' + err.message);
            }
        }
    };

    window.openViewer = (url) => {
        modalImg.src = url;
        modal.classList.add('show');
    };

    window.viewFull = (url) => {
        window.open(url, '_blank');
    };

    function resetUpload() {
        previewImg.classList.remove('show');
        fileNameSpan.innerText = 'कोई फाइल नहीं चुनी';
        fileSizeSpan.innerText = '—';
        status.innerText = '✨ फोटो चुनें, ऑटो कंप्रेस होगी';
        saveBtn.style.display = 'none';
        progressBar.style.display = 'none';
        selectedBlob = null;
    }
</script>
</body>
</html>
