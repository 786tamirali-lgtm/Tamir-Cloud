<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamir Cloud - Digital Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f7f9; padding: 15px; display: flex; flex-direction: column; align-items: center; color: #333; }
        
        /* Admin Panel */
        .admin-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; padding: 25px; margin-bottom: 30px; border: 1px solid #e0e0e0; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; font-size: 24px; }
        input, button { width: 100%; margin-top: 12px; padding: 14px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #1a73e8; box-shadow: 0 0 8px rgba(26,115,232,0.1); }
        .btn-upload { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; display: none; }
        .btn-upload:hover { background: #1557b0; }

        /* Store Gallery */
        .gallery { width: 100%; max-width: 450px; }
        .product-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); overflow: hidden; }
        .product-card img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; background: #eee; }
        
        .info { margin-top: 15px; text-align: center; }
        .info h3 { font-size: 22px; color: #2d3436; font-weight: 700; }
        .info .price-tag { color: #1a73e8; font-weight: 800; font-size: 20px; margin-top: 5px; }

        /* Order & Quantity Controls */
        .order-box { background: #fcfcfc; border-radius: 15px; padding: 18px; margin-top: 15px; border: 1px solid #f0f0f0; }
        .qty-row { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 15px; }
        .qty-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #fff; color: #1a73e8; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; }
        .qty-btn:active { transform: scale(0.9); }
        .qty-val { font-weight: 800; font-size: 22px; color: #2d3436; min-width: 35px; text-align: center; }
        
        .total-display { text-align: center; font-size: 15px; color: #666; margin-bottom: 12px; }
        .total-display b { color: #1a73e8; font-size: 18px; }

        /* WhatsApp Action */
        .btn-wa { background: #25D366; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-size: 16px; box-shadow: 0 4px 12px rgba(37,211,102,0.3); }
        .btn-wa:hover { background: #20b358; transform: translateY(-2px); }

        .btn-del { background: none; color: #b2bec3; border: none; font-size: 13px; cursor: pointer; margin-top: 15px; width: 100%; text-decoration: none; transition: 0.3s; }
        .btn-del:hover { color: #ff4d4f; }
    </style>
</head>
<body>

<div id="adminPanel" class="admin-card">
    <h2>🌩️ Tamir Cloud Pro</h2>
    <input type="text" id="pName" placeholder="Product का नाम दर्ज करें">
    <input type="number" id="pPrice" placeholder="कीमत (₹) भरें">
    <input type="file" id="imageFile" accept="image/*">
    <button id="uploadBtn" class="btn-upload">क्लाउड में लाइव करें</button>
</div>

<div class="gallery">
    <h3 style="margin-bottom:20px; color:#555; text-align: center; letter-spacing: 1px;">🛍️ आपका डिजिटल स्टोर</h3>
    <div id="list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAv2kO-fV5oKa4_mQj5TGBQGMUs142N4lc",
        authDomain: "tamir-cloud.firebaseapp.com",
        projectId: "tamir-cloud",
        databaseURL: "https://tamir-cloud-default-rtdb.firebaseio.com",
        appId: "1:216452127534:web:b8cb8e687f44eded0ef8bf"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let photoData = "";

    // Image Compression & Resizing (To save space in Tamir Cloud)
    imageFile.onchange = (e) => {
        const reader = new FileReader();
        reader.readAsDataURL(e.target.files[0]);
        reader.onload = () => {
            const img = new Image();
            img.src = reader.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 600; 
                canvas.height = img.height * (600 / img.width);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                photoData = canvas.toDataURL('image/jpeg', 0.6); // Compress to 60% quality
                uploadBtn.style.display = 'block';
                uploadBtn.scrollIntoView({ behavior: 'smooth' });
            };
        };
    };

    // Save Data to Firebase
    uploadBtn.onclick = async () => {
        if(!pName.value || !pPrice.value) return alert("नाम और कीमत जरूरी है!");
        uploadBtn.disabled = true;
        uploadBtn.innerText = "Processing...";
        
        const newRef = push(ref(db, 'publicStore'));
        await set(newRef, {
            name: pName.value,
            price: parseFloat(pPrice.value),
            image: photoData,
            timestamp: Date.now()
        });
        location.reload();
    };

    // Render Gallery with Auto-Calculation
    onValue(ref(db, 'publicStore'), (snapshot) => {
        const container = document.getElementById('list');
        container.innerHTML = "";
        snapshot.forEach((child) => {
            const val = child.val();
            const id = child.key;
            
            container.innerHTML += `
                <div class="product-card">
                    <img src="${val.image}" loading="lazy">
                    <div class="info">
                        <h3>${val.name}</h3>
                        <p class="price-tag">₹${val.price}</p>
                    </div>
                    
                    <div class="order-box">
                        <div class="total-display">Total Bill: <b id="total-${id}">₹${val.price}</b></div>
                        <div class="qty-row">
                            <button class="qty-btn" onclick="updateCalc('${id}', -1, ${val.price})">−</button>
                            <span class="qty-val" id="qty-${id}">1</span>
                            <button class="qty-btn" onclick="updateCalc('${id}', 1, ${val.price})">+</button>
                        </div>
                        <button class="btn-wa" onclick="sendOrder('${id}', '${val.name}', ${val.price})">
                             Order on WhatsApp
                        </button>
                    </div>

                    <button class="btn-del" onclick="secureDelete('${id}')">🗑️ Remove Item</button>
                </div>
            `;
        });
    });

    // Auto Calculation Logic
    window.updateCalc = (id, change, unitPrice) => {
        const qtyEl = document.getElementById('qty-' + id);
        const totalEl = document.getElementById('total-' + id);
        let currentQty = parseInt(qtyEl.innerText);
        
        currentQty += change;
        if (currentQty < 1) currentQty = 1;
        
        qtyEl.innerText = currentQty;
        totalEl.innerText = "₹" + (currentQty * unitPrice);
    };

    // Professional WhatsApp Integration
    window.sendOrder = (id, name, price) => {
        const qty = document.getElementById('qty-' + id).innerText;
        const total = qty * price;
        const myNumber = "918797221991";
        
        const message = `*📦 New Order from Tamir Cloud*%0A--------------------------%0A*Item:* ${name}%0A*Rate:* ₹${price}%0A*Qty:* ${qty}%0A%0A*✅ Total Bill: ₹${total}*%0A--------------------------%0APlease confirm my order.`;
        
        window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
    };

    // Secure Delete (Using your Mahasangrah Master Password)
    window.secureDelete = async (id) => {
        const pass = prompt("Admin पासवर्ड दर्ज करें:");
        if(pass === "tamir@lI00769") {
            if(confirm("क्या आप वाकई इस आइटम को डिलीट करना चाहते हैं?")) {
                await remove(ref(db, 'publicStore/' + id));
            }
        } else {
            alert("गलत पासवर्ड! आप इसे डिलीट नहीं कर सकते।");
        }
    };
</script>
</body>
</html>
